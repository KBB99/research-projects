<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSVP-Polyxan World Engine</title>

<style>
:root{ --green:#00ff88; }

html,body{
  margin:0;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:monospace;
  color:var(--green);
}

/* CRT scanlines */
body::after{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.04) 0,
    rgba(255,255,255,0.04) 1px,
    transparent 2px,
    transparent 4px
  );
  opacity:.15;
}

canvas{
  position:fixed;
  inset:0;
}

/* subtitles */
.sub{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:min(92vw,600px);
  text-align:center;
  font-size:14px;
  line-height:1.5;
  white-space:pre-wrap;
  word-wrap:break-word;
  padding:0 10px;
  text-shadow:0 0 8px var(--green);
  user-select:none;
}
</style>
</head>

<body>

<canvas id="c"></canvas>
<div class="sub" id="sub"></div>

<audio id="audio" preload="auto">
  <source src="The_physics_of_persistent_AI_worlds.mp3" type="audio/mpeg">
  <track src="The_physics_of_persistent_AI_worlds.vtt" kind="subtitles" default>
</audio>

<script>
const audio = document.getElementById('audio')
const subEl = document.getElementById('sub')

/* AUDIO CONTEXT (gesture-safe) */
let ctxA, analyser, buf

function initAudio(){
  if(ctxA) return

  ctxA = new (window.AudioContext || window.webkitAudioContext)()
  analyser = ctxA.createAnalyser()
  analyser.fftSize = 1024
  buf = new Uint8Array(analyser.fftSize)

  const src = ctxA.createMediaElementSource(audio)
  src.connect(analyser)
  analyser.connect(ctxA.destination)
}

/* CLICK ANYWHERE */
document.body.onclick = async ()=>{
  initAudio()

  if(ctxA.state !== "running"){
    await ctxA.resume()
  }

  if(audio.paused){
    await audio.play()
  } else {
    audio.pause()
  }
}

/* SUBTITLES */
audio.ontimeupdate = ()=>{
  const tt = audio.textTracks && audio.textTracks[0]
  if(!tt) return

  if(tt.mode !== "hidden") tt.mode = "hidden"

  const cue = tt.activeCues && tt.activeCues[0]
  subEl.textContent = cue ? cue.text : ''
}

/* CANVAS */
const c = document.getElementById('c')
const g = c.getContext('2d')

let w,h,cx,cy

function resize(){
  w = c.width = innerWidth
  h = c.height = innerHeight
  cx = w/2
  cy = h/2
}
resize()
addEventListener('resize', resize)

/* DRAW LOOP */
function draw(){

  /* phosphor fade */
  g.fillStyle = 'rgba(0,0,0,0.12)'
  g.fillRect(0,0,w,h)

  const R = Math.min(w,h)*0.4

  /* clip to circle */
  g.save()
  g.beginPath()
  g.arc(cx,cy,R,0,Math.PI*2)
  g.clip()

  if(analyser){
    analyser.getByteTimeDomainData(buf)

    const len = buf.length
    const lag = 25

    g.beginPath()

    for(let i=0;i<len;i++){
      const a = (buf[i]-128)/128
      const b = (buf[(i+lag)%len]-128)/128
      const t = i/len*Math.PI*2

      const x = cx + Math.sin(t*2)*a*R*0.7
      const y = cy + Math.sin(t*3)*b*R*0.7

      i ? g.lineTo(x,y) : g.moveTo(x,y)
    }

    g.strokeStyle = '#00ff88'
    g.shadowColor = '#00ff88'
    g.shadowBlur = 12
    g.lineWidth = 1.5
    g.stroke()
    g.shadowBlur = 0
  }

  g.restore()

  /* porthole ring */
  g.beginPath()
  g.arc(cx,cy,R,0,Math.PI*2)
  g.strokeStyle='rgba(0,255,136,0.7)'
  g.lineWidth=2
  g.stroke()

  requestAnimationFrame(draw)
}

draw()
</script>

</body>
</html>
