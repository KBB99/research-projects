<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audioscope — Slow Moving Verb</title>

<style>
body{
  margin:0;
  background:#000;
  color:#7cff7c;
  font-family:monospace;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  cursor:pointer;
}

.title{
  font-size:14px;
  letter-spacing:0.2em;
  color:#00ff88;
  text-shadow:0 0 10px #00ff66;
  margin-bottom:10px;
}

canvas{
  width:min(420px,85vw);
  height:min(420px,85vw);
  border-radius:50%;
  border:2px solid rgba(0,255,0,0.5);
  background:#000;
  box-shadow:
    0 0 40px rgba(0,255,120,0.2) inset,
    0 0 18px rgba(0,255,0,0.7);
}

.subs{
  position:fixed;
  bottom:10px;
  width:min(520px,92vw);
  text-align:center;
  padding:6px 10px;
  font-size:14px;
  color:#aaffaa;
  text-shadow:0 0 6px #00ff66;
  background:rgba(0,20,0,0.35);
  border:1px solid rgba(0,255,0,0.2);
  border-radius:6px;
  pointer-events:none;
  min-height:2em;
}
</style>
</head>

<body>

<div class="title">Everything Is a Slow Moving Verb</div>
<canvas id="viz"></canvas>
<div id="subs" class="subs"></div>

<audio id="audio" preload="auto">
  <source src="Everything_Is_a_Slow_Moving_Verb.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("audio");
const subs  = document.getElementById("subs");

/* ─────────────────────────────────────────────
   AUDIO SETUP
   Creates analyser so we can read waveform data
───────────────────────────────────────────── */
let ctx, analyser, data;

function initAudio(){
  if(ctx) return;

  ctx = new AudioContext();

  analyser = ctx.createAnalyser();
  analyser.fftSize = 2048;

  data = new Uint8Array(analyser.fftSize);

  const node = ctx.createMediaElementSource(audio);
  node.connect(analyser);
  analyser.connect(ctx.destination);
}

/* Click anywhere toggles play/pause */
document.body.onclick = async ()=>{
  initAudio();

  if(ctx.state === "suspended") await ctx.resume();

  if(audio.paused) await audio.play();
  else audio.pause();
};

/* ─────────────────────────────────────────────
   SUBTITLES (manual VTT parser)
───────────────────────────────────────────── */
let cues = [];

async function loadVTT(){
  try{
    const res = await fetch("Everything_Is_a_Slow_Moving_Verb.vtt");
    if(!res.ok) return;

    const text = await res.text();
    const blocks = text.split(/\n{2,}/);

    for(const block of blocks){
      const lines = block.trim().split("\n");
      const ts = lines.find(l=>l.includes("-->"));
      if(!ts) continue;

      const [s,e] = ts.split("-->").map(x=>x.trim());
      const txt = lines.slice(lines.indexOf(ts)+1).join(" ");

      cues.push({
        start: parseTime(s),
        end: parseTime(e),
        text: txt
      });
    }
  }catch(e){
    console.warn("VTT error", e);
  }
}

function parseTime(t){
  const p = t.split(":");
  return p.length===3
    ? +p[0]*3600 + +p[1]*60 + +p[2]
    : +p[0]*60 + +p[1];
}

/* Update subtitles based on current time */
audio.ontimeupdate = ()=>{
  const t = audio.currentTime;
  const c = cues.find(c=>t>=c.start && t<c.end);
  subs.textContent = c ? c.text : "";
};

loadVTT();

/* ─────────────────────────────────────────────
   CANVAS SETUP
───────────────────────────────────────────── */
const canvas = document.getElementById("viz");
const c = canvas.getContext("2d");

const W = 320, H = 320;
canvas.width = W;
canvas.height = H;

/* Time counter */
let t = 0;

/* Smooth noise (prevents periodic locking) */
function smoothNoise(x){
  return Math.sin(x)*0.5 + Math.sin(x*0.7)*0.3;
}

/* Collapse trigger (rare deformation events) */
function collapsePulse(t){
  return Math.sin(t*0.0007) > 0.995 ? 1 : 0;
}

/* ─────────────────────────────────────────────
   MAIN DRAW LOOP
───────────────────────────────────────────── */
function draw(){
  t++;

  /* Long persistence → "memory of trajectory" */
  c.fillStyle = "rgba(0,5,0,0.07)";
  c.fillRect(0,0,W,H);

  let buf, len;

  if(analyser){
    analyser.getByteTimeDomainData(data);
    buf = data;
    len = data.length;
  } else {
    /* idle state (so it never looks broken) */
    buf = new Uint8Array(512);
    for(let i=0;i<512;i++){
      buf[i] = 128 + Math.sin(i*0.1 + t*0.03)*28;
    }
    len = 512;
  }

  /* Energy = average deviation → used as "intensity" */
  let energy = 0;
  for(let i=0;i<len;i+=8){
    energy += Math.abs((buf[i]-128)/128);
  }
  energy /= (len/8);

  /* Drift = slow movement of the center
     → removes "fixed object" illusion */
  const driftX = Math.sin(t*0.002)*20;
  const driftY = Math.cos(t*0.0017)*15;

  /* Dynamic lag → prevents circular symmetry */
  const lag = Math.floor(len*(0.12 + smoothNoise(t*0.01)*0.15));

  /* Occasional collapse → brief structural deformation */
  const collapse = collapsePulse(t);

  const cx = W/2;
  const cy = H/2;

  /* Radius slightly shrinks under higher energy */
  const R = W*0.4*(1 - energy*0.2);

  /* Slow directional bias → gives "flow" */
  const thetaBias = t * 0.0008;

  c.beginPath();

  for(let i=0;i<len;i++){
    const a = (buf[i]-128)/128;
    const b = (buf[(i+lag)%len]-128)/128;

    /* Collapse introduces temporary distortion */
    const distortion = collapse ? Math.sin(i*0.2 + t*0.2)*0.4 : 0;

    const x = cx + driftX + (a + distortion) * R * Math.cos(thetaBias);
    const y = cy + driftY + (b - distortion) * R * Math.sin(thetaBias + 0.3);

    if(i===0) c.moveTo(x,y);
    else c.lineTo(x,y);
  }

  /* Main trace */
  c.strokeStyle = `rgba(120,255,140,${0.5 + energy*0.5})`;
  c.lineWidth   = 1.2 + energy*2;
  c.shadowBlur  = 15 + energy*30;
  c.shadowColor = "#00ff66";
  c.stroke();
  c.shadowBlur = 0;

  /* Residue layer (faint echo of past trajectory)
     → gives "memory field" feel */
  c.strokeStyle = "rgba(120,255,140,0.08)";
  c.lineWidth = 0.5;
  c.stroke();

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
